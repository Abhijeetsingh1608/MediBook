server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2000ms}

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${AUTH_DB_NAME:medibook_auth}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8081/login/oauth2/code/google}
            scope:
              - openid
              - profile
              - email

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:10000}
          timeout: ${MAIL_TIMEOUT:10000}
          writetimeout: ${MAIL_WRITE_TIMEOUT:10000}
          starttls:
            enable: true

logging:
  file:
    name: ${LOG_FILE:../logs/${spring.application.name}.log}
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE
    org.springframework.web: INFO


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  oauth2:
    success-redirect-url: ${OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:5173/oauth2/callback}
    failure-redirect-url: ${OAUTH2_FAILURE_REDIRECT_URL:http://localhost:5173/login}
  otp:
    expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}
  admin:
    login:
      secret: ${ADMIN_LOGIN_SECRET}
    bootstrap:
      email: ${ADMIN_BOOTSTRAP_EMAIL}
      password: ${ADMIN_BOOTSTRAP_PASSWORD}
  mail:
    from: ${MAIL_FROM}
  internal:
    secret: ${INTERNAL_GATEWAY_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

