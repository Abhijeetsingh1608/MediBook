services:
  # --- Infrastructure Services ---
  mysql:
    image: mysql:8.0
    container_name: medibook-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medibook-network

  redis:
    image: redis:7-alpine
    container_name: medibook-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medibook-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: medibook-rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_NODENAME: rabbit@rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medibook-network

  # --- MediBook Microservices ---
  eureka-server:
    image: medibook/eureka-server:latest
    container_name: medibook-eureka
    stop_grace_period: 30s
    ports:
      - "8761:8761"
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    networks:
      - medibook-network

  auth-service:
    image: medibook/auth-service:latest
    container_name: medibook-auth
    stop_grace_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8081:8081"
    networks:
      - medibook-network

  provider-service:
    image: medibook/provider-service:latest
    container_name: medibook-provider
    stop_grace_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8082:8082"
    networks:
      - medibook-network

  schedule-service:
    image: medibook/schedule-service:latest
    container_name: medibook-schedule
    stop_grace_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8083:8083"
    networks:
      - medibook-network

  appointment-service:
    image: medibook/appointment-service:latest
    container_name: medibook-appointment
    stop_grace_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8084:8084"
    networks:
      - medibook-network

  review-service:
    image: medibook/review-service:latest
    container_name: medibook-review
    stop_grace_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8085:8085"
    networks:
      - medibook-network

  record-service:
    image: medibook/record-service:latest
    container_name: medibook-record
    stop_grace_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8086:8086"
    networks:
      - medibook-network

  notification-service:
    image: medibook/notification-service:latest
    container_name: medibook-notification
    stop_grace_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8087:8087"
    networks:
      - medibook-network

  payment-service:
    image: medibook/payment-service:latest
    container_name: medibook-payment
    stop_grace_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8088:8088"
    networks:
      - medibook-network

  api-gateway:
    image: medibook/api-gateway:latest
    container_name: medibook-gateway
    stop_grace_period: 30s
    depends_on:
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8080:8080"
    networks:
      - medibook-network

  # --- Quality Assurance ---
  sonarqube-db:
    image: postgres:16-alpine
    container_name: medibook-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SONARQUBE_DB_NAME}
      POSTGRES_USER: ${SONARQUBE_DB_USER}
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD}
    volumes:
      - sonarqube-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - quality-network

  sonarqube:
    image: sonarqube:lts-community
    container_name: medibook-sonarqube
    restart: unless-stopped
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/${SONARQUBE_DB_NAME}
      SONAR_JDBC_USERNAME: ${SONARQUBE_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD}
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    networks:
      - quality-network

volumes:
  mysql-data:
  rabbitmq-data:
  sonarqube-postgres-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:

networks:
  medibook-network:
    name: medibook-network
    driver: bridge
  quality-network:
    name: medibook-quality-network
    driver: bridge
