services:
  # --- Infrastructure Services ---
  # AWS RDS is used instead of a local MySQL container

  redis:
    image: redis:7-alpine
    container_name: medibook-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medibook-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: medibook-rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_NODENAME: rabbit@rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medibook-network

  # --- MediBook Microservices ---
  eureka-server:
    image: 629054268853.dkr.ecr.ap-south-1.amazonaws.com/medibook/eureka-server:latest
    container_name: medibook-eureka
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "8761:8761"
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    networks:
      - medibook-network

  auth-service:
    image: 629054268853.dkr.ecr.ap-south-1.amazonaws.com/medibook/auth-service:latest
    container_name: medibook-auth
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=5
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8081:8081"
    networks:
      - medibook-network

  provider-service:
    image: 629054268853.dkr.ecr.ap-south-1.amazonaws.com/medibook/provider-service:latest
    container_name: medibook-provider
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      eureka-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8082:8082"
    networks:
      - medibook-network

  schedule-service:
    image: 629054268853.dkr.ecr.ap-south-1.amazonaws.com/medibook/schedule-service:latest
    container_name: medibook-schedule
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8083:8083"
    networks:
      - medibook-network

  appointment-service:
    image: 629054268853.dkr.ecr.ap-south-1.amazonaws.com/medibook/appointment-service:latest
    container_name: medibook-appointment
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      eureka-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8084:8084"
    networks:
      - medibook-network

  review-service:
    image: 629054268853.dkr.ecr.ap-south-1.amazonaws.com/medibook/review-service:latest
    container_name: medibook-review
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8085:8085"
    networks:
      - medibook-network

  record-service:
    image: 629054268853.dkr.ecr.ap-south-1.amazonaws.com/medibook/record-service:latest
    container_name: medibook-record
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8086:8086"
    networks:
      - medibook-network

  notification-service:
    image: 629054268853.dkr.ecr.ap-south-1.amazonaws.com/medibook/notification-service:latest
    container_name: medibook-notification
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8087:8087"
    networks:
      - medibook-network

  payment-service:
    image: 629054268853.dkr.ecr.ap-south-1.amazonaws.com/medibook/payment-service:latest
    container_name: medibook-payment
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      eureka-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8088:8088"
    networks:
      - medibook-network

  api-gateway:
    image: 629054268853.dkr.ecr.ap-south-1.amazonaws.com/medibook/api-gateway:latest
    container_name: medibook-gateway
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      eureka-server:
        condition: service_started
    env_file: .env
    environment:
      - EUREKA_DEFAULT_ZONE=http://eureka-server:8761/eureka
    ports:
      - "8080:8080"
    networks:
      - medibook-network

volumes:
  rabbitmq-data:

networks:
  medibook-network:
    name: medibook-network
    driver: bridge
