server:
  port: 8083

spring:
  application:
    name: schedule-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${SCHEDULE_DB_NAME:medibook_schedule}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
    non-secure-port: ${server.port}
    instance-id: ${spring.application.name}:${random.value}

logging:
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  internal:
    secret: ${INTERNAL_GATEWAY_SECRET}
