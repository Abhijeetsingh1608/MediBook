spring:
  application:
    name: appointment-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${APPOINTMENT_DB_NAME:medibook_appointment}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    hostname: localhost
    prefer-ip-address: false
    non-secure-port: ${server.port}
    instance-id: ${spring.application.name}:localhost:${server.port}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  file:
    name: ${LOG_FILE:../logs/${spring.application.name}.log}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  internal:
    secret: ${INTERNAL_GATEWAY_SECRET}
